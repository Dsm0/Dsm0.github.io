<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        .rainbow-text {
            background-image: linear-gradient(to left,
                    violet,
                    indigo,
                    blue,
                    green,
                    yellow,
                    orange,
                    red);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body {
            overflow: hidden;
        }
        svg {
            width:auto;
            height:auto;
        }
    </style>
    <title>Penrose</title>
    <script type="text/javascript"
        src="https://unpkg.com/@penrose/core@1.0.1-alpha.29/build/dist/penrose.min.js"></script>
    <script type="text/javascript">
    let penrose_files = {}
    // it's dirty but I don't care
        const update_files = () => {
            fetch('/projects/penrose_ide/tst.dsl')
                .then(response => response.text())
                .then((data) => {
                    penrose_files.dsl = data;
                })
            fetch('/projects/penrose_ide/tst.sub')
                .then(response => response.text())
                .then((data) => {
                    penrose_files.sub = data;
                })
            fetch('/projects/penrose_ide/tst.sty')
                .then(response => response.text())
                .then((data) => {
                    penrose_files.sty = data;
                    penrosify();
                })
        }

        function penrosify() {
            const elem = document.getElementById("root");
            elem.innerHTML = ""
            penrose.interactiveDiagram(penrose_files.dsl, penrose_files.sub, penrose_files.sty, elem);
        }
        document.onkeydown = (e) => {
            switch (e.key) {
                case " ":
                    update_files();
                    break;
                default:
                    console.log(e)
                    break;
            }
        }
    </script>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div style="display: grid;grid-auto-flow: column; position: absolute; left: 0px; top: 0px;">
    <h1 style="text-align: center; width: 300px; height: 40px;" class="rainbow-text">
        Penrose IDE
    </h1>
    <h5>originally written by <a href="https://www.cs.cmu.edu/~jssunshi/">Joshua Sunshine</a></h5>
    <p>
        <button type="button" >Penrosify (space)</button>
    </p>
    </div>
    <div id="root" style=" height: 90%; width: auto; overflow-y: hidden;"></div>

</body>

</html>
